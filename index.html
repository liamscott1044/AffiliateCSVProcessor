:root {
  --red: #D82622;
  --red-light: #F5D3D0;
  --black: #1a1a1a;
  --gray-dark: #333333;
  --gray-mid: #888888;
  --gray-light: #E8E8E8;
  --gray-bg: #F5F4F2;
  --white: #FFFFFF;
  --border: #DEDEDE;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--gray-bg);
  color: var(--black);
  font-family: 'MaisonNeue', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}

.logo-img {
  height: 44px;
  width: auto;
  display: block;
}

.header-tag {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray-mid);
  border-left: 1px solid var(--border);
  padding-left: 20px;
  margin-left: 20px;
}

.header-left {
  display: flex;
  align-items: center;
}

.header-right {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-mid);
}

/* Red accent bar */
.accent-bar {
  height: 3px;
  background: var(--red);
  width: 100%;
}

/* Main */
main {
  flex: 1;
  padding: 48px;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Page title */
.page-title {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gray-mid);
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

/* Card */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 32px 36px;
}

.card-label {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 20px;
}

/* Form */
.row {
  display: flex;
  gap: 20px;
  align-items: flex-end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray-mid);
}

input[type="text"],
input[type="number"] {
  background: var(--white);
  border: 1px solid var(--border);
  color: var(--black);
  font-family: 'MaisonNeue', 'Helvetica Neue', Helvetica, sans-serif;
  font-size: 13px;
  padding: 11px 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 0.3px;
}

input[type="text"]:focus,
input[type="number"]:focus {
  border-color: var(--red);
}

/* Drop Zone */
.drop-zone {
  border: 1px dashed var(--border);
  padding: 52px 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  background: var(--gray-bg);
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--red);
  background: #fdf5f5;
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.drop-icon {
  display: block;
  width: 36px;
  height: 36px;
  margin: 0 auto 16px;
  opacity: 0.25;
}

.drop-title {
  font-size: 13px;
  letter-spacing: 1px;
  margin-bottom: 6px;
  color: var(--black);
}

.drop-sub {
  font-size: 10px;
  color: var(--gray-mid);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.file-selected {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #fdf5f5;
  border: 1px solid var(--red-light);
  font-size: 11px;
  color: var(--red);
  margin-top: 12px;
  letter-spacing: 0.5px;
}

/* Stats */
.stats-bar {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  margin-top: 24px;
}

.stat {
  flex: 1;
  padding: 20px 24px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stat:last-child { border-right: none; }

.stat-val {
  font-size: 26px;
  letter-spacing: -0.5px;
  color: var(--red);
  line-height: 1;
}

.stat-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray-mid);
}

/* Tier chips */
.tier-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.tier-chip {
  border: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 100px;
}

.tier-name {
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--red);
}

.tier-count {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gray-mid);
}

/* Chunk list */
.chunk-preview {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 300px;
  overflow-y: auto;
}

.chunk-preview::-webkit-scrollbar { width: 3px; }
.chunk-preview::-webkit-scrollbar-track { background: var(--gray-bg); }
.chunk-preview::-webkit-scrollbar-thumb { background: var(--border); }

.chunk-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 9px 14px;
  background: var(--gray-bg);
  border-left: 2px solid transparent;
  font-size: 11px;
  letter-spacing: 0.3px;
  transition: border-color 0.1s;
}

.chunk-row:hover { border-left-color: var(--red); }

.chunk-num {
  font-size: 10px;
  color: var(--gray-mid);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}

.chunk-name { flex: 1; color: var(--gray-dark); }

.chunk-count {
  color: var(--red);
  flex-shrink: 0;
  font-size: 10px;
  letter-spacing: 1px;
}

/* Buttons */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 28px;
}

.btn {
  font-family: 'MaisonNeue', 'Helvetica Neue', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 14px 32px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--red);
  color: var(--white);
}

.btn-primary:hover { background: #bf201c; }
.btn-primary:disabled {
  background: var(--gray-light);
  color: var(--gray-mid);
  cursor: not-allowed;
}

.btn-secondary {
  background: transparent;
  color: var(--gray-mid);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--gray-dark);
  color: var(--gray-dark);
}

/* Status */
.status {
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 11px 14px;
  margin-top: 12px;
}

.status.error {
  background: #fdf5f5;
  border: 1px solid var(--red-light);
  color: var(--red);
}

.status.success {
  background: #f5fdf5;
  border: 1px solid #c8e6c9;
  color: #2e7d32;
}

/* Divider */
.section-divider {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gray-mid);
  margin-top: 24px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* Footer */
footer {
  text-align: center;
  padding: 24px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray-light);
  border-top: 1px solid var(--border);
  background: var(--white);
  margin-top: auto;
}
</style>

<main>
  <div class="page-title">Affiliate CSV Processor</div>

  <!-- Config -->
  <div class="card">
    <div class="card-label">Configuration</div>
    <div class="row">
      <div class="field">
        <label>Brand / Campaign Name</label>
        <input type="text" id="brandName" placeholder="e.g. Toolbox Beauty" />
      </div>
      <div class="field" style="max-width: 150px;">
        <label>Chunk Size</label>
        <input type="number" id="chunkSize" value="500" min="1" max="10000" />
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-label">Upload File</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv" />
      <svg class="drop-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 4V24M18 4L11 11M18 4L25 11M6 28H30" stroke="#1a1a1a" stroke-width="2" stroke-linecap="square"/>
      </svg>
      <div class="drop-title">Drop CSV here or click to browse</div>
      <div class="drop-sub">Expects "Author Handle" and "Priority List" columns</div>
    </div>
    <div id="fileLabel" style="display:none;" class="file-selected">
      <span>—</span>
      <span id="fileName"></span>
    </div>
    <div id="statusMsg" style="display:none;" class="status"></div>
  </div>

  <!-- Preview -->
  <div class="card" id="previewCard" style="display:none;">
    <div class="card-label">Analysis</div>

    <div class="tier-grid" id="tierGrid"></div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="statTotal">—</div>
        <div class="stat-label">Total Creators</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statChunks">—</div>
        <div class="stat-label">Output Files</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statChunkSize">—</div>
        <div class="stat-label">Per File</div>
      </div>
    </div>

    <div class="section-divider">Output Files</div>
    <div class="chunk-preview" id="chunkList"></div>

    <div class="actions">
      <button class="btn btn-primary" id="downloadBtn">Download ZIP</button>
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>
  </div>

<footer>© Maison MRKT &nbsp;·&nbsp; Creator Tools</footer>

<script>
function today() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(2);
  return `${mm}.${dd}.${yy}`;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 10); i++) {
    if (lines[i].includes('Author Handle')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return null;

  const headers = parseCSVLine(lines[headerIdx]);
  const handleCol = headers.findIndex(h => h.trim() === 'Author Handle');
  const priorityCol = headers.findIndex(h => h.trim() === 'Priority List');
  if (handleCol === -1) return null;

  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = parseCSVLine(line);
    const handle = (cols[handleCol] || '').trim();
    const priority = priorityCol >= 0 ? (cols[priorityCol] || '').trim() : '';
    if (handle) rows.push({ handle, priority });
  }
  return rows;
}

function extractPriorityNum(p) {
  const m = String(p).trim().toUpperCase().match(/^P(\d+)$/);
  return m ? parseInt(m[1], 10) : -1;
}

function buildChunks(rows, chunkSize) {
  const tierMap = {};
  for (const { handle, priority } of rows) {
    const num = extractPriorityNum(priority);
    if (!tierMap[num]) tierMap[num] = [];
    tierMap[num].push(handle);
  }

  const tierNums = Object.keys(tierMap).map(Number);
  tierNums.sort((a, b) => {
    if (a === -1) return 1;
    if (b === -1) return -1;
    return b - a;
  });

  const ordered = [];
  const tierInfo = [];
  for (const num of tierNums) {
    const handles = tierMap[num];
    const label = num === -1 ? 'Unprioritized' : `P${num}`;
    tierInfo.push({ label, count: handles.length });
    for (const h of handles) ordered.push({ handle: h, tierNum: num });
  }

  const chunks = [];
  for (let i = 0; i < ordered.length; i += chunkSize) {
    chunks.push(ordered.slice(i, i + chunkSize));
  }

  return { chunks, tierInfo };
}

function buildFileNames(chunks, dateStr, brand) {
  return chunks.map((chunk, i) => {
    const tierNums = [...new Set(chunk.map(r => r.tierNum))];
    const prioritized = tierNums.filter(n => n >= 0);
    const tierLabel = prioritized.length > 0 ? `P${Math.max(...prioritized)}` : '';
    return tierLabel
      ? `${dateStr} - ${brand} - ${tierLabel} - ${i + 1}`
      : `${dateStr} - ${brand} - ${i + 1}`;
  });
}

// DOM
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileLabel = document.getElementById('fileLabel');
const fileName = document.getElementById('fileName');
const statusMsg = document.getElementById('statusMsg');
const previewCard = document.getElementById('previewCard');
const tierGrid = document.getElementById('tierGrid');
const chunkList = document.getElementById('chunkList');
const statTotal = document.getElementById('statTotal');
const statChunks = document.getElementById('statChunks');
const statChunkSize = document.getElementById('statChunkSize');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const brandName = document.getElementById('brandName');
const chunkSizeInput = document.getElementById('chunkSize');

let parsedData = null;

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
chunkSizeInput.addEventListener('change', () => { if (parsedData) renderPreview(parsedData); });

function showStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = `status ${type}`;
  statusMsg.style.display = 'block';
}

function handleFile(file) {
  if (!file.name.endsWith('.csv')) { showStatus('Please upload a .csv file.', 'error'); return; }
  fileName.textContent = file.name;
  fileLabel.style.display = 'flex';
  statusMsg.style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    if (!rows) { showStatus('Could not find "Author Handle" column. Check that this is the correct file.', 'error'); return; }
    if (rows.length === 0) { showStatus('No creator handles found in this file.', 'error'); return; }
    parsedData = rows;
    renderPreview(rows);
  };
  reader.readAsText(file);
}

function renderPreview(rows) {
  const size = parseInt(chunkSizeInput.value) || 500;
  const { chunks, tierInfo } = buildChunks(rows, size);
  const dateStr = today();
  const brand = brandName.value.trim() || 'Brand';

  tierGrid.innerHTML = '';
  for (const t of tierInfo) {
    tierGrid.innerHTML += `
      <div class="tier-chip">
        <div class="tier-name">${t.label}</div>
        <div class="tier-count">${t.count.toLocaleString()} creators</div>
      </div>`;
  }

  statTotal.textContent = rows.length.toLocaleString();
  statChunks.textContent = chunks.length;
  statChunkSize.textContent = size.toLocaleString();

  const fileNames = buildFileNames(chunks, dateStr, brand);
  chunkList.innerHTML = '';
  chunks.forEach((chunk, i) => {
    chunkList.innerHTML += `
      <div class="chunk-row">
        <span class="chunk-num">${i + 1}</span>
        <span class="chunk-name">${fileNames[i]}</span>
        <span class="chunk-count">${chunk.length} creators</span>
      </div>`;
  });

  previewCard.style.display = 'block';
}

downloadBtn.addEventListener('click', async () => {
  const brand = brandName.value.trim();
  if (!brand) { showStatus('Please enter a brand name before downloading.', 'error'); return; }
  if (!parsedData) return;

  const size = parseInt(chunkSizeInput.value) || 500;
  const { chunks } = buildChunks(parsedData, size);
  const dateStr = today();
  const fileNames = buildFileNames(chunks, dateStr, brand);

  const zip = new JSZip();
  const folder = zip.folder(`${dateStr} - ${brand}`);
  chunks.forEach((chunk, i) => {
    folder.file(`${fileNames[i]}.csv`, 'handles\n' + chunk.map(r => r.handle).join('\n'));
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${dateStr} - ${brand}.zip`; a.click();
  URL.revokeObjectURL(url);
  showStatus(`Downloaded ${chunks.length} files in ZIP`, 'success');
});

resetBtn.addEventListener('click', () => {
  parsedData = null;
  fileInput.value = '';
  fileLabel.style.display = 'none';
  previewCard.style.display = 'none';
  statusMsg.style.display = 'none';
});
</script>
